<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../public/css/index.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
   <title>Register - BIBlog</title>
</head>
<body>
   <div class="topbar">
      <div class="wrapper target">
         <div class="left">
            <i class="fa-brands fa-square-x-twitter"></i>
            <i class="fa-brands fa-square-instagram"></i>
            <i class="fa-brands fa-square-facebook"></i>
         </div>
         <div class="center">
            <a href="../index.html">HOME</a>
            <a href="./about.html">ABOUT</a>
            <a href="./register.html">REGISTER</a>
            <a href="./login.html">LOGIN</a>
            <a href="./add.html">ADD</a>
         </div>
      </div>
   </div>

   <div class="logReg">
      <img src="../public/img/background/register.png" alt="register">
      <form id="registerForm">
         <div class="formGroup">
            <input type="email" id="regEmail" required>
            <span>Email *</span>
         </div>
         <div class="formGroup">
            <input type="text" id="regUser" required>
            <span>Username *</span>
         </div>
         <div class="formGroup">
            <input type="password" id="regPassword" required>
            <span>Password *</span>
         </div>
         <div class="btnGroup">
            <a href="./login.html">Do you have an account?</a>
            <button type="submit">Register</button>
         </div>
      </form>
   </div>

   <script type="module" src="../public/js/firebase.js"></script>
   <script type="module" src="../public/js/register.js"></script>
   <script type="module" src="../public/js/auth-kontrol.js"></script>
</body>
</html>
