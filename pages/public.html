<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIBlog Public Archive | Arşiv</title>
    
    <!-- CSS Dosyaları -->
    <link rel="stylesheet" href="../public/css/index.css">
    
    <!-- İkon Kütüphanesi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

    <!-- Üst Menü ve Arama Çubuğu -->
    <div class="topbar">
        <div class="wrapper target active">
            <div class="left">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    <i class="fa-solid fa-house"></i> HOME
                </a>
            </div>
            <div class="center" style="color: #ff4d4d; font-weight: bold; letter-spacing: 2px;">
                PUBLIC ARCHIVE
            </div>
            <div class="right">
                <div class="searchEngine" id="searchEngine">
                    <!-- id="searchInput" arama işlevi için kritiktir -->
                    <input type="text" id="searchInput" placeholder="Arşivde veya projelerde ara...">
                    <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Ana İçerik Alanı -->
    <div class="home" style="margin-top: 80px;">
        <div class="wrapper">
            <!-- JS tarafından doldurulacak alan -->
            <div class="posts" id="postContainer">
                <p style="text-align: center; width: 100%;">Gizli raporlar yükleniyor...</p>
            </div>
        </div>
    </div>

    <!-- Rapor Detay Penceresi (Modal) -->
    <div id="postModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modalImg" src="" alt="UFO Evidence">
            <h1 id="modalTitle"></h1>
            <p id="modalFullText"></p>
            <div id="modalMeta" class="authorAndDate"></div>
        </div>
    </div>

    <!-- Sayfa Altı -->
    <footer style="text-align: center; padding: 20px; margin-top: 50px; border-top: 1px solid #333; color: #888;">
        <p>🛸 UFO Research Database - Public Archive</p>
        <p><small>Veriler Firebase Firestore üzerinden anlık çekilmektedir.</small></p>
    </footer>

    <!-- SCRIPT YÜKLEME SIRALAMASI (ÖNEMLİ) -->
    
    <!-- 1. Temel Bağlantı -->
    <script type="module" src="../public/js/firebase.js"></script>
    
    <!-- 2. Yardımcı Fonksiyonlar (Arama ve Modal Hazırlığı) -->
    <script src="../public/js/modal.js"></script>
    <script src="../public/js/search.js"></script>
    <script src="../public/js/scroll.js"></script>
    
    <!-- 3. Ana İşlem (Verileri Çeken ve Her Şeyi Başlatan) -->
    <script type="module" src="../public/js/public.js"></script>

</body>
</html>
